<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Space - Không Gian Học Tập</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
}

header {
    text-align: center;
    padding: 30px;
    background: #ffffffcc;
    backdrop-filter: blur(10px);
}

h1 {
    margin: 0;
    color: #2c3e50;
}

.search-bar {
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 25px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-left: 5px;
    transition: 0.3s;
}

.google-btn {
    background: #34a853;
    color: white;
}

.ai-btn {
    background: #4285f4;
    color: white;
}

button:hover {
    opacity: 0.8;
    transform: scale(1.05);
}

.section {
    padding: 40px;
}

.section h2 {
    text-align: center;
    color: #34495e;
}

.card-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    width: 200px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    background: #f0f9ff;
}

footer {
    text-align: center;
    padding: 20px;
    background: #ffffffaa;
}
</style>

</head>
<body>

<header>
    <h1>📘 Study Space - Không Gian Học Tập</h1>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Tìm kiếm kiến thức...">
        <button class="google-btn" onclick="searchGoogle()">Tìm Google</button>
        <button class="ai-btn" onclick="searchAI()">Hỏi AI</button>
    </div>
</header>

<!-- Môn học -->
<div class="section">
    <h2>📚 Các Môn Học</h2>
    <div class="card-container">
        <div class="card">Toán học</div>
        <div class="card">Ngữ văn</div>
        <div class="card">Tiếng Anh</div>
        <div class="card">Vật lý</div>
        <div class="card">Hóa học</div>
        <div class="card">Sinh học</div>
    </div>
</div>

<!-- Khía cạnh học tập -->
<div class="section">
    <h2>🌱 Khía Cạnh Phát Triển</h2>
    <div class="card-container">
        <div class="card">Kỹ năng ghi nhớ</div>
        <div class="card">Tư duy logic</div>
        <div class="card">Quản lý thời gian</div>
        <div class="card">Đọc hiểu</div>
        <div class="card">Thuyết trình</div>
        <div class="card">Làm việc nhóm</div>
    </div>
</div>

<footer>
    🌟 Học tập mỗi ngày - Phát triển tương lai 🌟
</footer>

<script>
function searchGoogle() {
    let query = document.getElementById("searchInput").value;
    if(query !== "") {
        window.open("https://www.google.com/search?q=" + encodeURIComponent(query));
    }
}

function searchAI() {
    let query = document.getElementById("searchInput").value;
    if(query !== "") {
        window.open("https://chat.openai.com/?q=" + encodeURIComponent(query));
    }
}
</script>

</body>
</html>
